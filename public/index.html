<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Status — aswincloud</title>
    <meta name="description" content="Live status of the aswincloud home network and services." />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='44' fill='%2330d158'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="site-head">
        <div class="brand">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="brand-name">aswincloud status</span>
        </div>
        <div class="head-controls">
          <button id="signin" class="signin-btn" type="button" title="Sign in with Google (owner)">Sign in</button>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
            <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></g></svg>
          </button>
        </div>
      </header>

      <!-- Overall status banner -->
      <section id="overall" class="overall overall--loading" aria-live="polite">
        <div class="overall-pulse" aria-hidden="true"></div>
        <div class="overall-text">
          <h1 id="overall-title">Loading status…</h1>
          <p id="overall-sub" class="overall-sub">Fetching the latest checks</p>
        </div>
      </section>

      <!-- Monitor cards -->
      <main id="monitors" class="monitors" aria-busy="true">
        <div class="skeleton-card"></div>
      </main>

      <!-- Internet speed (rendered by app.js; hidden until data exists) -->
      <section id="speed" class="speed" hidden>
        <h2 class="section-title">Internet speed</h2>
        <div id="speed-card" class="speed-card"></div>

        <!-- Low-speed email alerts (double opt-in). Stable markup — not re-rendered. -->
        <div id="subscribe" class="subscribe">
          <button id="sub-toggle" class="sub-toggle" type="button">🔔 Get low-speed alerts</button>
          <form id="sub-form" class="sub-form" hidden>
            <input id="sub-email" class="sub-input" type="email" inputmode="email"
                   autocomplete="email" placeholder="you@example.com" aria-label="Email for speed alerts" required>
            <button id="sub-submit" class="sub-submit" type="submit">Subscribe</button>
            <button id="sub-cancel" class="sub-cancel" type="button" aria-label="Cancel">×</button>
          </form>
          <p id="sub-msg" class="sub-msg" hidden></p>

          <!-- Owner-only: edit the alert threshold live. Shown only when signed in. -->
          <div id="sub-threshold" class="sub-threshold" hidden>
            <label class="thr-label" for="thr-input">Alert me below</label>
            <input id="thr-input" class="thr-input" type="number" min="1" step="10" inputmode="numeric" aria-label="Alert threshold in Mbps">
            <span class="thr-unit">Mbps</span>
            <button id="thr-save" class="thr-save" type="button">Save</button>
            <span id="thr-msg" class="thr-msg"></span>
          </div>
        </div>
      </section>

      <!-- Incident history -->
      <section class="incidents">
        <h2 class="section-title">Past incidents</h2>
        <ol id="incident-list" class="incident-list">
          <li class="incident-empty">No incidents recorded yet.</li>
        </ol>
        <button id="incident-more" class="incident-more" type="button" hidden></button>
      </section>

      <footer class="site-foot">
        <span id="updated">—</span>
        <span class="dot-sep">·</span>
        <span>auto-refreshes every 20s</span>
      </footer>
    </div>

    <!-- Tooltip element reused for day-bar hovers -->
    <div id="tip" class="tip" role="tooltip" hidden></div>

    <script src="/app.js" defer></script>
  </body>
</html>
